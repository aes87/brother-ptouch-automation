name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[barcode,service,test]'
          pip install --no-deps 'brother_pt @ git+https://github.com/treideme/brother_pt.git'
      - name: ruff
        run: ruff check src tests
      - name: pytest
        run: pytest -q
